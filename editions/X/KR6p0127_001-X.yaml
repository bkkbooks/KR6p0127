body:
  text: 菩薩比丘尼量海淨土詩能從忍界現西方只要當人信願強處處慈尊常接引即時演出妙蓮香廬山面目舊家風嫡子親傳道自同成佛以來今十劫彌陀合在我心中淨土昭昭在目前不勞舉步問金仙樂有路誰先到咫尺家山落照邊瓦礫荊榛真淨土見聞知覺古彌陀但能當處忘分別拍手呵呵唱哩囉持戒嚴身福報真金沙地上玉樓春但觀自性彌陀佛歷劫何嘗染一塵要結西方淨土緣是非人我盡傾蠲脚頭脚底蓮花國到岸何須更覓船佛語禪心兩不差桃紅李白一般花琉璃地上鋪金粟瑪瑙堦前布玉沙獨坐幽居萬慮忘全身渾是法中王休將迷悟遮心眼正覺花開徧界香偶作兀兀翛然却是癡明明了徹實無知施為動轉原非識水月相交暎綠池一處消融六處閒夕陽西去月東環現成公案休提起高臥北窗門不關二十四氣省懷詩選三驚蟄聞雷萬物蘇莫從箇裏認榮枯山前㵎水源頭活徹底澄清不受污春分紫陌谷鶯啼一片閒雲伴我栖明月清風留不住逍遙自在任東西大雪繽紛似絮團高山平地一同觀頭頭物物無窮意多少禪流被眼瞞無題看他孤獨人真為無事客出入往來間逍遙無杖䇿既無兒女情亦無妻子迫偶然樹下坐則見梅花白行到山盡頭坐看雲起處白雲天際飛紅日空中住滄海變桑田邱陵夷無地起滅水中漚聚散小兒戲堪嗟為僧者未聞佛教音但知噇飽飯不悟本來人終日心境鬬拘牽利與名能得幾時在俄成一聚塵今朝年初一元旦是好日鑼鼓響个个衣冠飾相逢咸打恭茶話喜作揖人人賀新年我道是舊日石室寒巗客不知晝與夜坐來歲月忘嬾把眾生化真个自了漢賊虎龍蛇怕問他廬陵米如今作麼價但說世界空時時行於有空亦不自空有亦不自有空有本來無無無何須守論塵野犴鳴談真獅子吼今古往來客奔波日夜忙貪榮為底事謀利作經商富貴暫時樂泥犁萬劫長前程長遠在何不早還鄉人壽不滿百夭殤更可憐況逢世路險往復轉喬遷恩愛終須別冤親未了緣無生極樂國解脫自安然業淨未曾乾眾生處處著回頭自反觀旋轉皆旅泊但覺本性空諸緣自脫却逍遙無事人所在成安樂聚沙菴歌一粒沙藏世界無邊剎土不為大童子戲莊成佛塔山僧旋繞忘疲怠何為菴絕纏蓋樓臺殿閣無障礙廚竈三門日日新交飛羣燕往來賓未識菴中誰是主主中之主沒疎親沒疏親無用人莫向个中細討論八風不動消息盡覺海圓明心月澄體似鏡用如神胡來漢現不留痕城隍市井如來藏有相身中無相身屋雖小恰寬舒恒沙諸佛眾生居成住壞空幻起滅基地堅牢本自如三椽下六窻內吃飯穿衣無向背茫茫今古眾英雄千萬買隣空自累經題如是這箇是恁麼旋嵐而倒嶽十方與三世何處生芒角春暖花爛漫秋風樹葉落切莫動著他天然活卓卓擬古為平湖陸孝女作瞻彼鵡湖維潔維清厥有陸女曰孝曰貞一解無父何怙有母能慈撫我育我朝夕依依二解俾我及笄為我聯姻夭桃未賦孤雁沈淪三解誓不再更願終養母裁雲縷月不辭勞服四解母沒女存女淚濺濺竟隨母逝貞孝兩全五解光明心地一志允終神其遠矣名留淛東六解念佛詩四十八首一句彌陀稱性稱蓮花九品攝三乘無生一念超權學補處金臺即可登一句彌陀三際平願弘六八一時成三祗萬行圓修證頓悟無生無不生一句彌陀妙悟存性空罪福不留痕蓮花朵朵隨心現聽法常依世所尊一句彌陀理現成無修無證亦無生法王自有光明界步步琉璃地上行一句彌陀信願真東西土不離當人箇中圓裹三千界樹樹花開一樣春一句彌陀照世燈無邊教海總持能本來妙諦通真俗不滯中觀即上乘一句彌陀決定稱別求向上更何能聲聲遍滿處空界落盡牽纏倚樹藤我朝世宗憲皇帝云直將阿彌陀佛四字作句話頭一念萬年自然摸著鼻孔一句彌陀果作因天真父子體同倫堂堂獨露娘生面信步還鄉莫背親一句彌陀體用真當陽覿面露全身無陰陽地翻觔斗剎剎塵塵轉法輪一句彌陀信口稱纔興一念隔千層本真豈待回光照無量音聲即法燈一句彌陀念慮清當人已屬寶蓮生何須兩土分清濁个个毗盧頂上行一句彌陀稱自心廣長舌相是知音六方齊讚彌陀佛不是尋常學誦吟一句彌陀度此生蓮花國裏早標名八功德水常充滿如意珠王骨自清一句彌陀轉法輪緣因徹處了因真明珠護惜戒根淨一剎那間證正因一句彌陀佛脉清開權顯實悟無生圓明處處長安道何用三車門外迎一句彌陀辟惡氛娑婆苦海頓超羣風聲鳥語談真諦淨穢何妨分不分一句彌陀妙獨尊性修交互莫須論同時遮照身心徹依正融通不二門一句彌陀決定因樂徑路不迷津何須更覓安心法始本如如子向親一句彌陀靜聽真聲聲喚醒本來人明珠百八循環轉無數祥光舌底申一句彌陀三昧成冥通聖境佛來迎玲瓏性相蓮花土不動身心悟法明一句彌陀本最清三修圓具果中因而今莫問如如諦脫體無依身外身一句彌陀念莫停繁華叢裏夢初醒雲開月現光華滿徧界花臺故國寧一句彌陀妙轉輪恒沙諸佛讚斯人同聲相應金臺現頓證無生即法身一句彌陀了義成直心正念志專精真誠不假功勳就花閣重重隨自行一句彌陀別有靈紅塵影裏白蓮馨池深花大猶餘事露坐金臺法界寧一句彌陀作入神山河大地絕纖塵莊嚴無量從心現心地閒閒四季春一句彌陀救死生超凡行願霎時成輪迴從此頓然息來往無遮法界清一句彌陀滌俗襟法身向上少知音堂堂日用天真佛不肯回頭何處尋一句彌陀絕妙門依憑四字出乾坤法王最勝伽陀藥唯在都盧一口吞一句彌陀靜有音無邊勝侶已來臨本光一發浮雲散見佛原來見自心一句彌陀法樂成汪洋苦海一時傾水晶樓閣蓮花座慧照重重萬法明一句彌陀萬念真金剛堅固力持身得生彼國無窮壽覺樹花開別有春一句彌陀法法平六根無礙六塵清本來四土無高下福慧良田不假耕一句彌陀佛慧明唯心淨土不生生從來身土原非隔主伴圓融性海平一句彌陀願力誠圓成十念往西行居然下品猶登岸托質蓮胎脫四生一句彌陀盡力稱三塗八難總超升持名滅罪金蓮現悲願全憑佛力增一句彌陀慧月臨如來護念善根深徑登不退趨安養垢習塵勞總不侵一句彌陀信可珍金容佛影現吾心此生每厭娑婆苦遙想花池寶樹林一句彌陀見本真回光返照脫沈淪願將八德池中水滌盡娑婆世上塵一句彌陀慧力存甚深妙法在斯門鍛凡煉聖金師子金體玲瓏報佛恩花嚴極樂極樂花嚴一句彌陀俗慮清誰聞淨土不求生祇緣彼國嚴新果廣種心田努力耕一句彌陀無古今慈雲靄靄倍欽心當觀落日如懸鼓天樂盈空法韻深一句彌陀轉念輪五根五力妙嚴身百千三昧從斯就萬善齊修不退因似有永明在目一句彌陀物不侵塵塵剎剎現吾心無邊天樂微風奏更有頻伽發妙音一句彌陀悅性情功深離相逆流行雙亡雙照心無染離即離非法性平一句彌陀妙莫論花嚴界裏十玄因破除情量知無礙一念齊開勝法輪靈復曰絕似鏡影鐘聲諸作一句彌陀境界清三千性相等圓明一方土淨方方淨一念專精念念精一句彌陀心月臨後心功在最初心三祗片念圓無二即此因深果自深阿育王舍利塔前然指願文歸命大願王無垢清淨光解脫三昧海蕩滌我心涼弟子如德等與法界含識無始至今具二種之無明作二死之根本迷真逐妄背覺合塵依於三業六根所造五逆十重惡因廣大苦果無窮沒溺三途沈埋六道因緣宿習感報女流學正教以靡窮修淨業而罔就雖墮僧數於戒有違反復思維慚惶克責敬然一指奉供本師釋迦文佛真身舍利寶塔平等真如一體三寶蓮花界中彌陀如來觀音勢至海眾菩薩同垂證明加被攝受如德假陳幻焰指頭煅煉金剛智性慧光晃耀裂邪見之網羅妙觀圓通破重陰之區宇罪愆消滅早悟圓頓上乘修證齊融直入毗盧性海忘身與意利己及人平等光中決定往生極樂世界寂光真境不隔纖毫更願臨命終時三心圓顯三障頓消蓮開上品之花佛授菩提之記承事十方諸佛度化一切有情盡未來際無有疲厭目前機䟦夫目前機者從上諸老宿自悟已後見色聞聲舉步掉臂語默動靜瞬目揚眉無不是顯揚第一義諦吐露本分家風所謂目前機也然先賢後學雖悟本性非一非異蓋為見解未忘猶被目前種種境緣所奪是故悟有淺深見有徧圓且目前機法門最廣其義極深迷之者六根門頭逐色隨聲向外馳求而莫之返悟之者觸境返緣返流旋一當處消融在處解脫機能轉者轉萬物而消歸自己此乃真開後學之慧眼以續從上之正宗也警眾語花嚴以人中師子比佛五十三善知識獨一比丘尼以師子為號可知威神卓越成就佛心不以比丘尼而遂弱也我等墮在僧數毀形割愛違親去里為何事乎實因生死事大無常迅速一句了然斷盡輪迴惡境而已若為名利榮耀稱心快樂非出家之本志矣今之出家人一經剃落便自高狂不了自心受人禮敬如斯行止難報四恩徒入空門將何憑恃況乃人身難得佛法難聞已得已聞又復錯過袈裟下不明此事苦無極矣且今日大比丘僧還有諸方叢林禪堂規䇿堂頭長老開示熏聞雖自迷昧漸得明通我輩比丘尼眾都無此也終日喧喧逐色隨聲向外馳求未嘗返省為師不教為徒不學光陰可惜剎那一生荏再人間而無所益夫女人出家當棄女人之習發勝妙之種尊重高僧猛入佛法心懺悔念清涼深發大悲心全行解脫事方得十方矜式四眾環興伏望諸賢及早立志己事未明他事莫理專心一處不了不休然此一事人人本具各各現成所以心源未暢逐境飄馳實因終日在妄想影子裏作活計不得真實受用地無論念佛參禪總要將我等歷劫以來愛習愛種次第拔出一時破盡方有下手處終日一行習氣若發自家斷之還歸一行一行功深於靜細中照見種子還以一行除之一行有力愛種自枯即永絕眾生心累也然一行不論禪淨總是孤炯炯地十二時中更無一事十二時中常若有事方是修也斷不可一念涉入名聞利養也所謂神尼不在現通說法但禪淨二宗或單修一行或並作一行各人手眼隨力修之親近善知識思惟了義教於一切法心心平等如是用功者得力而省力省力而得力即神尼也何以故直截下手未曾自欺也師子搏虎用全力師子搏兔用全力有人問用何等力古人云不欺之力果能不欺則十二時中本光常住勤修一行頓顯本來矣靈山會上六千比丘尼未受成佛之記龍女一出大眾皆興故六千比丘尼近作法師遠階佛位然在師子一頻申則已五十三位具足尼不自弱則法界本無遠近也何不痛念出家時一場甘苦猛就大法學師子頻伸脫盡諸女人境界乎清規束身神明自遠勿甘碌碌是我真眷屬矣
